<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedQuiz — 의사국가고시 퀴즈</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ══════════════════════════════════
     메인 페이지
══════════════════════════════════ -->
<div id="page-home" class="page active">
  <div class="page-wrap">
    <header class="top-bar">
      <div class="logo">
        <div class="logo-mark">M</div>
        <span class="logo-text">MedQuiz</span>
      </div>
      <button class="back-btn" onclick="showPage('page-wrong-menu')">📋 오답노트</button>
    </header>

    <div class="content">
      <div class="hero">
        <div class="hero-eyebrow">의사국가고시 필기 대비</div>
        <h1 class="hero-title">임상의학<br><span class="accent">퀴즈 트레이너</span></h1>
        <p class="hero-sub">과목별 문제 풀기 · 오답 집중 복습 · 실력 분석</p>
      </div>

      <div class="dept-grid">
        <button class="dept-card" onclick="startQuiz('내과','internal')">
          <span class="dept-icon">🫀</span>
          <span class="dept-name">내과</span>
          <span class="dept-eng">Internal Medicine</span>
        </button>
        <button class="dept-card" onclick="startQuiz('산부인과','ob')">
          <span class="dept-icon">🤱</span>
          <span class="dept-name">산부인과</span>
          <span class="dept-eng">OB / GYN</span>
        </button>
        <button class="dept-card" onclick="startQuiz('응급의학과','emergency')">
          <span class="dept-icon">🚨</span>
          <span class="dept-name">응급의학과</span>
          <span class="dept-eng">Emergency Medicine</span>
        </button>
        <button class="dept-card" onclick="startQuiz('소아청소년과','pediatrics')">
          <span class="dept-icon">🧒</span>
          <span class="dept-name">소아청소년과</span>
          <span class="dept-eng">Pediatrics</span>
        </button>
      </div>

      <div class="wrong-section">
        <button class="wrong-btn" onclick="showPage('page-wrong-menu')">
          <span>📋 오답 복습하기</span>
          <span class="badge" id="home-wrong-count">0</span>
        </button>
      </div>

      <div class="stats-bar">
        <div class="stat-item">
          <span class="stat-num" id="stat-total">0</span>
          <span class="stat-label">총 풀이</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num green" id="stat-correct">0</span>
          <span class="stat-label">정답</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num red" id="stat-wrong">0</span>
          <span class="stat-label">오답</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num blue" id="stat-rate">0%</span>
          <span class="stat-label">정답률</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════
     로딩 페이지
══════════════════════════════════ -->
<div id="page-loading" class="page">
  <div class="page-wrap" style="display:flex;align-items:center;justify-content:center;">
    <div style="text-align:center;">
      <div class="spinner"></div>
      <p style="color:var(--text2);margin-top:16px;font-size:15px;">문제를 불러오는 중...</p>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════
     퀴즈 페이지
══════════════════════════════════ -->
<div id="page-quiz" class="page">
  <div class="page-wrap">
    <div class="top-bar">
      <button class="back-btn" onclick="confirmHome()">← 홈</button>
      <div class="quiz-info">
        <span class="dept-badge" id="quiz-dept-badge"></span>
        <span class="quiz-counter" id="quiz-counter"></span>
      </div>
      <div class="score-mini">
        <span class="correct" id="quiz-correct-count">✓ 0</span>
        <span class="wrong"   id="quiz-wrong-count">✗ 0</span>
      </div>
    </div>

    <div class="progress-track">
      <div class="progress-fill" id="quiz-progress"></div>
    </div>

    <div class="content" style="padding-top:20px;">
      <!-- 번호 탭 -->
      <div id="quiz-tabs" style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:20px;"></div>

      <!-- 문제 카드 -->
      <div class="question-card">
        <div class="q-number" id="quiz-qnum"></div>
        <div class="q-text" id="quiz-qtext"></div>
      </div>

      <!-- 답변 영역 -->
      <div id="quiz-answer-area"></div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════
     결과 페이지
══════════════════════════════════ -->
<div id="page-result" class="page">
  <div class="page-wrap">
    <header class="top-bar">
      <div class="logo">
        <div class="logo-mark">M</div>
        <span class="logo-text">MedQuiz</span>
      </div>
    </header>
    <div class="content">
      <div class="result-wrap">
        <div class="result-emoji" id="result-emoji"></div>
        <h2 class="result-title" id="result-title"></h2>

        <div class="result-ring">
          <svg viewBox="0 0 120 120" class="ring-svg">
            <circle class="ring-bg" cx="60" cy="60" r="50"/>
            <circle class="ring-fg" id="ring-fg" cx="60" cy="60" r="50" style="stroke:var(--accent);stroke-dashoffset:314;"/>
          </svg>
          <div class="ring-label">
            <span class="ring-pct" id="result-pct"></span>
            <span class="ring-sub">정답률</span>
          </div>
        </div>

        <div class="result-stats">
          <div class="rs-item">
            <span class="rs-num green" id="result-correct"></span>
            <span class="rs-label">정답</span>
          </div>
          <div class="rs-item">
            <span class="rs-num red" id="result-wrong"></span>
            <span class="rs-label">오답</span>
          </div>
          <div class="rs-item">
            <span class="rs-num" id="result-total"></span>
            <span class="rs-label">전체</span>
          </div>
        </div>

        <div class="result-actions" id="result-actions"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════
     오답노트 메뉴
══════════════════════════════════ -->
<div id="page-wrong-menu" class="page">
  <div class="page-wrap">
    <header class="top-bar">
      <button class="back-btn" onclick="showPage('page-home')">← 홈</button>
      <span style="font-family:var(--font-serif);font-weight:700;">오답노트</span>
      <button class="back-btn" onclick="clearWrong()" style="border-color:var(--red);color:var(--red);">🗑 초기화</button>
    </header>
    <div class="content">
      <h2 class="section-title">📋 오답노트 (<span id="wrong-total">0</span>문제)</h2>
      <div id="wrong-empty" style="display:none;" class="toast">오답이 없어요! 문제를 먼저 풀어보세요.</div>
      <div class="wrong-grid" id="wrong-dept-grid"></div>
      <button class="wrong-card mix" id="wrong-mix-btn" onclick="startWrongQuiz('MIX')" style="width:100%;cursor:pointer;">
        MIX 전체 오답 <span class="badge" id="wrong-mix-count">0</span>
      </button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
