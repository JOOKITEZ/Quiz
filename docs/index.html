<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedQuiz — 의사국가고시 퀴즈</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ══════════════════════════════════
     메인 페이지
══════════════════════════════════ -->
<div id="page-home" class="page active">
  <div class="page-wrap">
    <header class="top-bar">
      <div class="logo">
        <div class="logo-mark">M</div>
        <span class="logo-text">MedQuiz</span>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="back-btn" onclick="showPage('page-my-quiz-menu')">✏️ 나만의 문제</button>
        <button class="back-btn" onclick="showPage('page-wrong-menu')">📋 오답노트</button>
      </div>
    </header>

    <div class="content">
      <div class="hero">
        <div class="hero-eyebrow">의사국가고시 필기 대비</div>
        <h1 class="hero-title">임상의학<br><span class="accent">퀴즈 트레이너</span></h1>
        <p class="hero-sub">과목별 문제 풀기 · 오답 집중 복습 · 실력 분석</p>
      </div>

      <div class="dept-grid">
        <button class="dept-card" onclick="startQuiz('내과','internal')">
          <span class="dept-icon">🫀</span>
          <span class="dept-name">내과</span>
          <span class="dept-eng">Internal Medicine</span>
        </button>
        <button class="dept-card" onclick="startQuiz('산부인과','ob')">
          <span class="dept-icon">🤱</span>
          <span class="dept-name">산부인과</span>
          <span class="dept-eng">OB / GYN</span>
        </button>
        <button class="dept-card" onclick="startQuiz('응급의학과','emergency')">
          <span class="dept-icon">🚨</span>
          <span class="dept-name">응급의학과</span>
          <span class="dept-eng">Emergency Medicine</span>
        </button>
        <button class="dept-card" onclick="startQuiz('소아청소년과','pediatrics')">
          <span class="dept-icon">🧒</span>
          <span class="dept-name">소아청소년과</span>
          <span class="dept-eng">Pediatrics</span>
        </button>
      </div>

      <div class="wrong-section">
        <button class="wrong-btn" onclick="showPage('page-wrong-menu')">
          <span>📋 오답 복습하기</span>
          <span class="badge" id="home-wrong-count">0</span>
        </button>
      </div>

      <div class="stats-bar">
        <div class="stat-item">
          <span class="stat-num" id="stat-total">0</span>
          <span class="stat-label">총 풀이</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num green" id="stat-correct">0</span>
          <span class="stat-label">정답</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num red" id="stat-wrong">0</span>
          <span class="stat-label">오답</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num blue" id="stat-rate">0%</span>
          <span class="stat-label">정답률</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════
     검색 페이지
══════════════════════════════════ -->
<div id="page-search" class="page">
  <div class="page-wrap">
    <header class="top-bar">
      <button class="back-btn" onclick="showPage('page-home')">← 홈</button>
      <span style="font-family:var(--font-serif);font-weight:700;">키워드 검색</span>
      <div style="width:80px;"></div>
    </header>
    <div class="content">

      <!-- 과목 선택 -->
      <div style="margin-bottom:16px;">
        <p class="answer-label" style="margin-bottom:10px;">과목 선택</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="search-dept-btn active" data-dept="전체" onclick="selectSearchDept(this)">전체</button>
          <button class="search-dept-btn" data-dept="내과" onclick="selectSearchDept(this)">내과</button>
          <button class="search-dept-btn" data-dept="산부인과" onclick="selectSearchDept(this)">산부인과</button>
          <button class="search-dept-btn" data-dept="응급의학과" onclick="selectSearchDept(this)">응급의학과</button>
          <button class="search-dept-btn" data-dept="소아청소년과" onclick="selectSearchDept(this)">소아청소년과</button>
        </div>
      </div>

      <!-- 검색창 -->
      <div style="display:flex;gap:8px;margin-bottom:24px;">
        <input type="text" id="search-input" class="answer-input"
               placeholder="문제 키워드를 입력하세요..." style="flex:1;"
               oninput="doSearch()" />
      </div>

      <!-- 결과 -->
      <div id="search-result-count" style="font-size:13px;color:var(--text3);margin-bottom:12px;"></div>
      <div id="search-results"></div>

    </div>
  </div>
</div>

<!-- ══════════════════════════════════
     로딩 페이지
══════════════════════════════════ -->
<div id="page-loading" class="page">
  <div class="page-wrap" style="display:flex;align-items:center;justify-content:center;">
    <div style="text-align:center;">
      <div class="spinner"></div>
      <p style="color:var(--text2);margin-top:16px;font-size:15px;">문제를 불러오는 중...</p>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════
     퀴즈 페이지
══════════════════════════════════ -->
<div id="page-quiz" class="page">
  <div class="page-wrap">
    <div class="top-bar">
      <button class="back-btn" onclick="confirmHome()">← 홈</button>
      <div class="quiz-info">
        <span class="dept-badge" id="quiz-dept-badge"></span>
        <span class="quiz-counter" id="quiz-counter"></span>
      </div>
      <div class="score-mini">
        <span class="correct" id="quiz-correct-count">✓ 0</span>
        <span class="wrong"   id="quiz-wrong-count">✗ 0</span>
      </div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="quiz-progress"></div>
    </div>
    <div class="content" style="padding-top:20px;">
      <div id="quiz-tabs" style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:20px;"></div>
      <div class="question-card">
        <div class="q-number" id="quiz-qnum"></div>
        <div class="q-text" id="quiz-qtext"></div>
      </div>
      <div id="quiz-answer-area"></div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════
     결과 페이지
══════════════════════════════════ -->
<div id="page-result" class="page">
  <div class="page-wrap">
    <header class="top-bar">
      <div class="logo">
        <div class="logo-mark">M</div>
        <span class="logo-text">MedQuiz</span>
      </div>
    </header>
    <div class="content">
      <div class="result-wrap">
        <div class="result-emoji" id="result-emoji"></div>
        <h2 class="result-title" id="result-title"></h2>
        <div class="result-ring">
          <svg viewBox="0 0 120 120" class="ring-svg">
            <circle class="ring-bg" cx="60" cy="60" r="50"/>
            <circle class="ring-fg" id="ring-fg" cx="60" cy="60" r="50" style="stroke:var(--accent);stroke-dashoffset:314;"/>
          </svg>
          <div class="ring-label">
            <span class="ring-pct" id="result-pct"></span>
            <span class="ring-sub">정답률</span>
          </div>
        </div>
        <div class="result-stats">
          <div class="rs-item">
            <span class="rs-num green" id="result-correct"></span>
            <span class="rs-label">정답</span>
          </div>
          <div class="rs-item">
            <span class="rs-num red" id="result-wrong"></span>
            <span class="rs-label">오답</span>
          </div>
          <div class="rs-item">
            <span class="rs-num" id="result-total"></span>
            <span class="rs-label">전체</span>
          </div>
        </div>
        <div class="result-actions" id="result-actions"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════
     오답노트 메뉴
══════════════════════════════════ -->
<div id="page-wrong-menu" class="page">
  <div class="page-wrap">
    <header class="top-bar">
      <button class="back-btn" onclick="showPage('page-home')">← 홈</button>
      <span style="font-family:var(--font-serif);font-weight:700;">오답노트</span>
      <button class="back-btn" onclick="clearWrong()" style="border-color:var(--red);color:var(--red);">🗑 초기화</button>
    </header>
    <div class="content">
      <h2 class="section-title">📋 오답노트 (<span id="wrong-total">0</span>문제)</h2>
      <div id="wrong-empty" style="display:none;" class="toast">오답이 없어요! 문제를 먼저 풀어보세요.</div>
      <div class="wrong-grid" id="wrong-dept-grid"></div>
      <button class="wrong-card" id="wrong-my-btn" onclick="startWrongQuiz('나만의문제')"
              style="width:100%;cursor:pointer;margin-bottom:10px;display:none;">
        ✏️ 나만의 문제 오답 <span class="badge" id="wrong-my-count">0</span>
      </button>
      <button class="wrong-card mix" id="wrong-mix-btn" onclick="startWrongQuiz('MIX')"
              style="width:100%;cursor:pointer;">
        MIX 전체 오답 <span class="badge" id="wrong-mix-count">0</span>
      </button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════
     나만의 문제 메뉴
══════════════════════════════════ -->
<div id="page-my-quiz-menu" class="page">
  <div class="page-wrap">
    <header class="top-bar">
      <button class="back-btn" onclick="showPage('page-home')">← 홈</button>
      <span style="font-family:var(--font-serif);font-weight:700;">나만의 문제</span>
      <button class="back-btn" onclick="showPage('page-my-quiz-create')" style="border-color:var(--green);color:var(--green);">+ 문제 만들기</button>
    </header>
    <div class="content">
      <h2 class="section-title">✏️ 나만의 문제 (<span id="my-quiz-total">0</span>문제)</h2>
      <div id="my-quiz-empty" class="toast">아직 만든 문제가 없어요! 문제를 만들어보세요.</div>

      <!-- 풀기 버튼 -->
      <div id="my-quiz-play-area" style="display:none;margin-bottom:24px;">
        <button class="submit-btn" onclick="startMyQuiz()" style="margin-bottom:0;">▶ 나만의 문제 풀기</button>
      </div>

      <!-- 문제 목록 -->
      <div id="my-quiz-list"></div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════
     나만의 문제 제작 페이지
══════════════════════════════════ -->
<div id="page-my-quiz-create" class="page">
  <div class="page-wrap">
    <header class="top-bar">
      <button class="back-btn" onclick="showPage('page-my-quiz-menu')">← 목록</button>
      <span style="font-family:var(--font-serif);font-weight:700;" id="create-page-title">문제 만들기</span>
      <div style="width:80px;"></div>
    </header>
    <div class="content">

      <!-- 과목 -->
      <div class="answer-input-group">
        <label class="answer-label">과목</label>
        <select id="create-dept" class="answer-input" style="cursor:pointer;">
          <option value="내과">내과</option>
          <option value="산부인과">산부인과</option>
          <option value="응급의학과">응급의학과</option>
          <option value="소아청소년과">소아청소년과</option>
          <option value="나만의문제">기타</option>
        </select>
      </div>

      <!-- 타입 -->
      <div class="answer-input-group">
        <label class="answer-label">문제 유형</label>
        <div style="display:flex;gap:10px;">
          <label class="choice-label" style="flex:1;cursor:pointer;" onclick="setCreateType(1)">
            <input type="radio" name="create-type" value="1" checked style="display:none;" />
            <span class="choice-num" id="type-num-1">1</span>
            <span>객관식</span>
          </label>
          <label class="choice-label" style="flex:1;cursor:pointer;" onclick="setCreateType(2)">
            <input type="radio" name="create-type" value="2" style="display:none;" />
            <span class="choice-num" id="type-num-2">2</span>
            <span>단답형</span>
          </label>
        </div>
      </div>

      <!-- 문제 본문 -->
      <div class="answer-input-group">
        <label class="answer-label">문제 본문</label>
        <textarea id="create-question" class="answer-input" placeholder="문제를 입력하세요"></textarea>
      </div>

      <!-- 선택지 (객관식만) -->
      <div id="create-choices-area" class="answer-input-group">
        <label class="answer-label">선택지</label>
        <div style="display:flex;flex-direction:column;gap:8px;" id="create-choices-list">
          <div class="choice-row" style="display:flex;gap:8px;align-items:center;">
            <span style="color:var(--text3);min-width:20px;font-size:13px;">1)</span>
            <input type="text" class="answer-input" placeholder="선택지 1" style="flex:1;padding:10px 14px;" />
          </div>
          <div class="choice-row" style="display:flex;gap:8px;align-items:center;">
            <span style="color:var(--text3);min-width:20px;font-size:13px;">2)</span>
            <input type="text" class="answer-input" placeholder="선택지 2" style="flex:1;padding:10px 14px;" />
          </div>
          <div class="choice-row" style="display:flex;gap:8px;align-items:center;">
            <span style="color:var(--text3);min-width:20px;font-size:13px;">3)</span>
            <input type="text" class="answer-input" placeholder="선택지 3" style="flex:1;padding:10px 14px;" />
          </div>
          <div class="choice-row" style="display:flex;gap:8px;align-items:center;">
            <span style="color:var(--text3);min-width:20px;font-size:13px;">4)</span>
            <input type="text" class="answer-input" placeholder="선택지 4" style="flex:1;padding:10px 14px;" />
          </div>
          <div class="choice-row" style="display:flex;gap:8px;align-items:center;">
            <span style="color:var(--text3);min-width:20px;font-size:13px;">5)</span>
            <input type="text" class="answer-input" placeholder="선택지 5 (선택)" style="flex:1;padding:10px 14px;" />
          </div>
        </div>
      </div>

      <!-- 정답 -->
      <div class="answer-input-group">
        <label class="answer-label" id="create-answer-label">정답 (번호 입력, 예: 3)</label>
        <input type="text" id="create-answer" class="answer-input" placeholder="정답을 입력하세요" />
      </div>

      <input type="hidden" id="create-edit-id" value="" />
      <button class="submit-btn" onclick="saveMyQuiz()">저장하기</button>

    </div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
